name: Remind README Contributors

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  remind-readme-contributors:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Remind contributors to update the config source
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- readme-contribution-reminder -->';
            const reminderBody = [
              marker,
              'Thanks for the README update.',
              '',
              `This repository's README is generated, so please review the [Contributing guide](https://github.com/${context.repo.owner}/${context.repo.repo}#contributing) before editing it directly.`,
              '',
              'To make sure the change comes from a valid config source, please update the relevant config in [Chat2AnyLLM/awesome-repo-configs](https://github.com/Chat2AnyLLM/awesome-repo-configs) as well.',
            ].join('\n');

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              }
            );

            const readmeWasEdited = files.some((file) => file.filename === 'README.md');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              }
            );

            const existingComment = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes(marker)
            );

            if (!readmeWasEdited) {
              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                });
              }

              return;
            }

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: reminderBody,
              });

              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reminderBody,
            });
